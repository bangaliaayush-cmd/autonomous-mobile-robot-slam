slam_toolbox:
  ros__parameters:

    use_sim_time: true
    mode: mapping

    map_frame: map
    odom_frame: odom
    base_frame: base_link

    scan_topic: scan
    scan_frame: laser_link

    resolution: 0.05
    max_laser_range: 12.0

    minimum_time_interval: 0.5
    transform_timeout: 0.5

    enable_interactive_mode: true
